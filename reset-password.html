<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | ShopCompare</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="brand-section">
            <div class="brand-content">
                <div class="logo"><i class="fas fa-shopping-basket"></i><span>ShopCompare</span></div>
                <h1>Set a New Password</h1>
                <p>Enter the 6-digit code we sent and your new password.</p>
            </div>
        </div>

        <div class="form-section">
            <div class="form-container">
                <div class="form-header"><h2>Reset Your Password</h2></div>

                <form id="resetPasswordForm">
                    <div class="input-group">
                        <label><i class="fas fa-key"></i> 6-Digit Code</label>
                        <input type="text" id="resetCode" placeholder="Enter the code from email" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-lock"></i> New Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="newPassword" placeholder="Enter new password" required>
                            <button type="button" class="toggle-password" id="toggleNewPassword"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-lock"></i> Confirm New Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                            <button type="button" class="toggle-password" id="toggleConfirmPassword"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <button type="submit" class="login-btn">Reset Password <i class="fas fa-key"></i></button>
                    <div id="messageArea" class="message-area"></div>
                    <div class="register-link"><p><a href="index.html">Back to Login</a></p></div>
                </form>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay"><div class="loader"></div><p>Resetting password...</p></div>

    <style>
        .message-area { margin-top: 1rem; padding: 0.75rem; border-radius: 12px; text-align: center; font-size: 0.9rem; display: none; }
        .message-success { background-color: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .message-error { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    </style>

    <script>
        const form = document.getElementById('resetPasswordForm');
        const codeInput = document.getElementById('resetCode');
        const newPassInput = document.getElementById('newPassword');
        const confirmInput = document.getElementById('confirmPassword');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const messageArea = document.getElementById('messageArea');

        function setupToggle(btnId, inputId) {
            const btn = document.getElementById(btnId);
            const inp = document.getElementById(inputId);
            if (btn) btn.addEventListener('click', () => {
                const type = inp.type === 'password' ? 'text' : 'password';
                inp.type = type;
                btn.querySelector('i').classList.toggle('fa-eye-slash');
            });
        }
        setupToggle('toggleNewPassword', 'newPassword');
        setupToggle('toggleConfirmPassword', 'confirmPassword');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = codeInput.value.trim();
            const newPass = newPassInput.value;
            const confirm = confirmInput.value;

            if (!code) { showMessage('Please enter the 6-digit code.', 'error'); return; }
            if (!newPass || newPass.length < 6) { showMessage('New password must be at least 6 characters.', 'error'); return; }
            if (newPass !== confirm) { showMessage('Passwords do not match.', 'error'); return; }

            const storedCode = sessionStorage.getItem('resetCode');
            const resetEmail = sessionStorage.getItem('resetEmail');

            if (!storedCode || !resetEmail) {
                showMessage('No password reset request found. Please start over.', 'error');
                return;
            }

            if (code !== storedCode) {
                showMessage('Invalid reset code. Please try again.', 'error');
                return;
            }

            loadingOverlay.classList.add('active');
            await new Promise(resolve => setTimeout(resolve, 800));

            // Update password in localStorage
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            const userIndex = users.findIndex(u => u.email === resetEmail);
            if (userIndex !== -1) {
                users[userIndex].password = newPass;
                localStorage.setItem('users', JSON.stringify(users));
                // Clear temporary data
                sessionStorage.removeItem('resetCode');
                sessionStorage.removeItem('resetEmail');
                showMessage('Password reset successful! Redirecting to login...', 'success');
                setTimeout(() => window.location.href = 'index.html', 2000);
            } else {
                showMessage('Account not found. Please register.', 'error');
            }
            loadingOverlay.classList.remove('active');
        });

        function showMessage(msg, type) {
            messageArea.textContent = msg;
            messageArea.className = `message-area message-${type}`;
            messageArea.style.display = 'block';
            setTimeout(() => messageArea.style.display = 'none', 4000);
        }
    </script>
</body>
</html>
