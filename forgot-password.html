<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | ShopCompare</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="brand-section">
            <div class="brand-content">
                <div class="logo"><i class="fas fa-shopping-basket"></i><span>ShopCompare</span></div>
                <h1>Reset Your Password</h1>
                <p>Enter your email address and we'll send you a reset code.</p>
            </div>
        </div>

        <div class="form-section">
            <div class="form-container">
                <div class="form-header"><h2>Forgot Password?</h2><p>We'll send a 6-digit code to your email.</p></div>

                <form id="forgotPasswordForm">
                    <div class="input-group">
                        <label><i class="fas fa-envelope"></i> Email Address</label>
                        <input type="email" id="resetEmail" placeholder="Enter your email address" required>
                    </div>
                    <button type="submit" class="login-btn">Send Reset Code <i class="fas fa-paper-plane"></i></button>
                    <div id="messageArea" class="message-area"></div>
                    <div class="register-link"><p><a href="index.html">Back to Login</a></p></div>
                </form>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay"><div class="loader"></div><p>Sending code...</p></div>

    <style>
        .message-area { margin-top: 1rem; padding: 0.75rem; border-radius: 12px; text-align: center; font-size: 0.9rem; display: none; }
        .message-success { background-color: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .message-error { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    </style>

    <script>
        const form = document.getElementById('forgotPasswordForm');
        const emailInput = document.getElementById('resetEmail');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const messageArea = document.getElementById('messageArea');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            if (!email || !/^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(email)) {
                showMessage('Please enter a valid email address.', 'error');
                return;
            }

            loadingOverlay.classList.add('active');
            await new Promise(resolve => setTimeout(resolve, 1000));

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email);
            if (!user) {
                showMessage('No account found with that email address.', 'error');
                loadingOverlay.classList.remove('active');
                return;
            }

            // Generate 6-digit code
            const resetCode = Math.floor(100000 + Math.random() * 900000).toString();
            // Store code temporarily (in a real app this would be sent via email)
            sessionStorage.setItem('resetCode', resetCode);
            sessionStorage.setItem('resetEmail', email);

            // Simulate email (show code in alert)
            alert(`Password reset code for ${email}: ${resetCode}\n\n(Simulated email - in production this would be sent to your inbox.)`);

            // Redirect to reset-password page
            window.location.href = 'reset-password.html';
        });

        function showMessage(msg, type) {
            messageArea.textContent = msg;
            messageArea.className = `message-area message-${type}`;
            messageArea.style.display = 'block';
            setTimeout(() => messageArea.style.display = 'none', 4000);
        }
    </script>
</body>
</html>
